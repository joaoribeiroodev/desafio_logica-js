<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Lógica JavaScript</title>
</head>

<body>
    <script>

        //função que pede valores (inteiros ou decimais)
        function pedirNumero(mensagem) {
            while (true) {
                let entrada = prompt(mensagem);

                if (entrada === null) {
                    alert("Você precisa digitar um valor!");
                    continue;
                }

                entrada = entrada.replace(",", ".").trim();

                let valor = Number(entrada);

                if (!isNaN(valor) && valor > 0)
                    return valor;

                alert("Digite um número válido!");
            }
        }

        //função que pede apenas valores inteiros
        function pedirInteiro(mensagem) {
            while (true) {
                let entrada = prompt(mensagem);

                if (entrada === null) {
                    alert("Você precisa digitar um valor!");
                    continue;
                }

                entrada = entrada.trim();

                let valor = Number(entrada);

                if (Number.isInteger(valor) && valor > 0 && entrada === valor.toString()) {
                    return valor;
                }

                alert("Digite um número inteiro válido!");
            }
        }

        //função para imprimir uma mensagem formatada
        function imprimirTexto(mensagem) {
            document.write(mensagem);
            document.write("<br>");
        }

        //recebendo a distancia percorrida
        let distanciaPercorrida = pedirNumero(`Qual a distância percorrida de sua casa até seu trabalho (em km) ?`);
        console.log(`A distancia percorrida é ${distanciaPercorrida}`);

        //recebendo o consumo médio do veiculo
        let consumoMedio = pedirNumero(`Qual o consumo médio do veículo (em Km/L) ?`);
        console.log(`O consumo medio é ${consumoMedio} km/L`);

        //calcula e exibe o consumo necessario para realizar o percurso
        let consumoNecessarioLitros = distanciaPercorrida / consumoMedio;
        console.log(`O consumo necessario é ${consumoNecessarioLitros}L`);
        imprimirTexto(`O consumo necessário em litros é ${consumoNecessarioLitros}L`);

        //recebe a quantidade de postos pesquisados
        let postosPesquisados = pedirInteiro(`Em quantos postos você pesquisou ?`);
        console.log(`A quantidade de postos pesquisados é ${postosPesquisados}`);

        let somaPrecos = 0;
        let menorValorEncontrado = Infinity;

        //pede os valores de cada posto, a partir da quantidade de postos pesquisados que foi inserido exibe a pergunta
        for (let i = 1; i <= postosPesquisados; i++) {
            let precoPosto = pedirNumero(`Digite o valor encontrado (em R$) no posto ${i}:`)

            somaPrecos += precoPosto;

            //encotra o menor valor pesquisado
            if (precoPosto < menorValorEncontrado) {
                menorValorEncontrado = precoPosto;

            }
        }
        console.log(`A soma dos valores é: ${somaPrecos}`);

        //exibe o menor valor pesquisado
        console.log(`O menor valor pesquisado foi: R$ ${menorValorEncontrado}`);
        imprimirTexto(`O menor valor pesquisado é R$${menorValorEncontrado.toFixed(2)}`);

        //calcula e exibe a media dos valores pesquisados no posto
        let mediaPrecos = somaPrecos / postosPesquisados;
        console.log(`A media dos valores pesquisados é ${mediaPrecos}`);
        imprimirTexto(`A média dos valores pesquisados é R$${mediaPrecos.toFixed(2)}`);

        //calcula e exibe o gasto diario (ida e volta)
        let gastoDiario = 2 * (consumoNecessarioLitros * menorValorEncontrado);
        console.log(`O gasto diário é R$${gastoDiario.toFixed(2)}`);
        imprimirTexto(`O gasto diário (ida e volta) é R$${gastoDiario.toFixed(2)}`);

    </script>
</body>

</html>
